<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CereViva — Consultant Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 100%;
            padding: 40px;
        }

        .brand {
            font-size: 13px;
            font-weight: 700;
            color: #2B4C8F;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 32px;
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 15px;
            color: #333;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: #2B4C8F; }

        .btn {
            width: 100%;
            background: #2B4C8F;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .btn:hover { background: #1a3a6b; }

        .error {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            color: #cc0000;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">CereViva</div>
    <h1>Consultant Login</h1>
    <p class="subtitle">Sign in to access your dashboard</p>

    <div class="error" id="error-msg">Incorrect username or password. Please try again.</div>

    <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" />
    </div>

    <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" />
    </div>

    <button class="btn" onclick="login()">Sign In →</button>
</div>

<script>
    async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!username || !password) {
            document.getElementById("error-msg").style.display = "block";
            return;
        }

        const res = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        if (res.ok) {
            const data = await res.json();
            localStorage.setItem("token", data.token);
            window.location.href = "/dashboard";
        } else {
            document.getElementById("error-msg").style.display = "block";
        }
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
    });
</script>
</body>
</html>
